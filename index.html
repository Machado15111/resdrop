    <!-- Primary meta -->
    <title>ResDrop — Post-Booking Hotel Rate Monitoring</title>
    <meta name="description" content="ResDrop monitors your hotel reservation after booking — checking the hotel's official website, Expedia, Booking.com, and supported sources. Get alerted when a better equivalent rate appears. You decide whether to act." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://resdrop.app/" />
    <meta property="og:title" content="ResDrop — Post-Booking Hotel Rate Monitoring" />
    <meta property="og:description" content="ResDrop monitors your hotel reservation after booking and alerts you when a better equivalent rate appears. Hotel direct, Expedia, Booking.com, and more. You stay in control." />

    <meta property="og:image:width" content="1200" />

    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@resdrop" />
    <meta name="twitter:title" content="ResDrop — Post-Booking Hotel Rate Monitoring" />
    <meta name="twitter:description" content="Your reservation is just the start. ResDrop monitors hotel rates after you book and alerts you when a better equivalent appears." />
    <meta name="twitter:image" content="https://resdrop.app/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://resdrop.app/" />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ResDrop",
      "url": "https://resdrop.app",
      "logo": "https://resdrop.app/favicon.png",
      "description": "Post-booking hotel rate monitoring platform. ResDrop monitors your hotel reservation and alerts you when a better equivalent rate appears.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@resdrop.app",
        "contactType": "customer support"
      },
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ResDrop",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web",
      "description": "Post-booking hotel monitoring platform. Monitors hotel reservations across hotel direct, Expedia, Booking.com, and supported sources.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD"
        }
      ],
      "url": "https://resdrop.app"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What kind of bookings does ResDrop monitor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ResDrop monitors refundable hotel reservations. Because refundable bookings can be cancelled and rebooked if a better option appears, monitoring them is directly actionable."
          }
        },
        {
          "@type": "Question",
          "name": "Which sources does ResDrop check?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ResDrop monitors the hotel's official direct booking channel, Expedia, Booking.com, and additional supported sources. For eligible subscribers, we also check special fare channels not always visible through standard OTA search."
          }
        },
        {
          "@type": "Question",
          "name": "Will ResDrop automatically rebook or cancel my reservation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. ResDrop never modifies, cancels, or rebooks a reservation without your explicit approval. When a better equivalent opportunity is found, you receive an alert. You review it and decide whether to act."
          }
        },
        {
          "@type": "Question",
          "name": "Is ResDrop free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ResDrop offers a free plan that allows you to monitor one active reservation. Paid plans unlock additional bookings, priority alerts, and access to special fare monitoring."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
